syntax = "proto3";

message main {
 int32 gameID = 2;
 personal_result player_results = 8;
 repeated players players = 201;
 repeated players_results players_result = 301;
}
message players_results {
 int32 some_id = 1;
 personal_result results = 2;
}
message players { 
 int32 player_id = 1;
 name_clan name_and_clan = 2;
}

message name_clan { 
 string name = 1;
 string clan = 5;
}

message personal_result { 
 int32 damage = 8;
 int32 shots = 4;
 int32 xp = 3;
 int32 hits = 5;
 int32 penetrations = 7;
 int32 player_id = 101;
 int32 assist = 9;
 int32 hit_received = 12;
 int32 pens_received = 15;
 int32 non_pen_received = 13;
 int32 damaged_enemies = 17;
 int32 damaged_destroyed = 18;
}
